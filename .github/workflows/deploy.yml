name: Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci --silent

      - name: Rodar testes
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build de produção
        run: npm run build -- --configuration=production

      - name: Enviar build para EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Compacta o build para envio rápido
          tar -czf frontend-dist.tar.gz -C dist/saas/browser .

          # Envia o tar para a EC2
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              frontend-dist.tar.gz \
              "$EC2_USER@$EC2_HOST:/home/ec2-user/frontend-dist.tar.gz"

          # Extrai direto em /var/www/vainozap (onde o nginx do host serve)
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "$EC2_USER@$EC2_HOST" \
              "set -e
               sudo mkdir -p /var/www/vainozap
               sudo rm -rf /var/www/vainozap/*
               sudo tar -xzf /home/ec2-user/frontend-dist.tar.gz -C /var/www/vainozap
               sudo nginx -t && sudo systemctl reload nginx
               echo 'Deploy concluido! Verificando...'
               curl -sf http://localhost && echo 'Frontend UP!' || echo 'Aviso: health check falhou'"
