name: Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci --silent

      - name: Rodar testes
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build de produção
        run: npm run build -- --configuration=production

      - name: Enviar build e reiniciar container
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Compacta o build para envio rápido
          tar -czf frontend-dist.tar.gz -C dist/saas/browser .

          # Envia o tar e os arquivos de configuração
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              frontend-dist.tar.gz nginx.conf Dockerfile \
              "$EC2_USER@$EC2_HOST:/home/ec2-user/vainozap-front/"

          # Descompacta, rebuilda a imagem Docker e reinicia o container
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "$EC2_USER@$EC2_HOST" \
              "
                set -e
                cd /home/ec2-user/vainozap-front

                # Extrai build na pasta html/
                rm -rf html && mkdir -p html
                tar -xzf frontend-dist.tar.gz -C html

                # Cria Dockerfile minimalista (só serve os arquivos compilados)
                cat > Dockerfile.serve <<'DOCKERFILE'
FROM nginx:1.27-alpine
RUN rm /etc/nginx/conf.d/default.conf
COPY nginx.conf /etc/nginx/conf.d/app.conf
COPY html/ /usr/share/nginx/html
EXPOSE 80
CMD [\"nginx\", \"-g\", \"daemon off;\"]
DOCKERFILE

                # Para e remove container antigo (se existir)
                docker stop vainozap-front 2>/dev/null || true
                docker rm   vainozap-front 2>/dev/null || true

                # Rebuilda imagem com o Dockerfile minimalista
                docker build -f Dockerfile.serve -t vainozap-front .

                # Sobe novo container na porta 3000
                docker run -d \
                  --name vainozap-front \
                  --restart unless-stopped \
                  -p 3000:80 \
                  vainozap-front

                # Health check
                for i in 1 2 3 4 5; do
                  sleep 5
                  curl -sf http://localhost:3000 && echo 'Frontend UP!' && exit 0
                  echo \"Aguardando... tentativa \$i/5\"
                done
                echo 'Frontend nao respondeu em 25s'
                exit 1
              "
