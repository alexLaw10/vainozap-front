name: Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci --silent

      - name: Rodar testes
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build de produção
        run: npm run build -- --configuration=production

      - name: Enviar build e reiniciar container
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Compacta o build para envio rápido
          tar -czf frontend-dist.tar.gz -C dist/saas/browser .

          # Envia o tar + configs + Dockerfile minimalista
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              frontend-dist.tar.gz nginx.conf Dockerfile.serve \
              "$EC2_USER@$EC2_HOST:/home/ec2-user/vainozap-front/"

          # Descompacta, rebuilda imagem e reinicia container
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "$EC2_USER@$EC2_HOST" \
              "set -e
               cd /home/ec2-user/vainozap-front
               rm -rf html && mkdir -p html
               tar -xzf frontend-dist.tar.gz -C html
               docker stop vainozap-front 2>/dev/null || true
               docker rm   vainozap-front 2>/dev/null || true
               docker build -f Dockerfile.serve -t vainozap-front .
               docker run -d --name vainozap-front --restart unless-stopped -p 3000:80 vainozap-front
               for i in 1 2 3 4 5; do
                 sleep 5
                 curl -sf http://localhost:3000 && echo 'Frontend UP!' && exit 0
                 echo Aguardando tentativa \$i/5
               done
               echo 'Frontend nao respondeu em 25s' && exit 1"
