@if (label()) {
  <label class="label" [for]="resolvedId">{{ label() }}</label>
}
<div class="wrap">
  <input
    class="control"
    [class.is-error]="error()"
    [type]="show() ? 'text' : 'password'"
    [id]="resolvedId"
    [placeholder]="placeholder()"
    [autocomplete]="autocomplete()"
    [disabled]="disabled()"
    [value]="value()"
    (input)="onInput($event)"
  />
  <button
    type="button"
    class="toggle"
    [attr.aria-label]="show() ? 'Ocultar senha' : 'Mostrar senha'"
    [disabled]="disabled()"
    (click)="toggle()"
    tabindex="-1"
  >
    <app-icon [name]="show() ? 'eye-off' : 'eye'" [size]="16"></app-icon>
  </button>
</div>
@if (error()) {
  <span class="msg msg--error" role="alert">{{ error() }}</span>
} @else if (hint()) {
  <span class="msg">{{ hint() }}</span>
}
