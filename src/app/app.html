@if (bootState() !== 'off') {
  <div class="app-boot" [class.app-boot--fade]="bootState() === 'fade'" aria-live="polite" aria-busy="true">
    <div class="app-boot__card">
      <div class="app-boot__cart-wrap" aria-hidden="true">
        <app-cart-icon [animated]="true" />
      </div>
      <p class="app-boot__text">A encher o carrinho…</p>
    </div>
  </div>
}

<router-outlet />
