@if (bootState() !== 'off') {
  <div class="app-boot" [class.app-boot--fade]="bootState() === 'fade'" aria-live="polite" aria-busy="true">
    <div class="app-boot__card">
      <div class="app-boot__cart-wrap" aria-hidden="true">
        <svg class="app-boot__svg" viewBox="0 0 120 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="app-boot-fill" x1="60" y1="100" x2="60" y2="38" gradientUnits="userSpaceOnUse">
              <stop stop-color="var(--color-primary)" stop-opacity="0.95" />
              <stop offset="1" stop-color="var(--color-secondary)" stop-opacity="0.85" />
            </linearGradient>
            <clipPath id="app-boot-basket-inner">
              <path
                d="M28 42 L32 82 H88 L92 42 Z"
              />
            </clipPath>
          </defs>
          <!-- alça -->
          <path
            d="M38 42 V34 C38 24 46 18 56 18 H64 C74 18 82 24 82 34 V42"
            stroke="currentColor"
            stroke-width="3.5"
            stroke-linecap="round"
            fill="none"
            class="app-boot__stroke"
          />
          <!-- corpo do cesto (contorno) -->
          <path
            d="M22 38 H98 L92 86 H28 L22 38 Z"
            stroke="currentColor"
            stroke-width="3.5"
            stroke-linejoin="round"
            fill="var(--color-surface-base)"
            class="app-boot__stroke"
          />
          <!-- "líquido" / nível a subir dentro do cesto -->
          <g clip-path="url(#app-boot-basket-inner)">
            <rect x="26" y="38" width="68" height="48" fill="url(#app-boot-fill)" class="app-boot__liquid" />
          </g>
          <!-- contorno interior por cima do fill -->
          <path
            d="M22 38 H98 L92 86 H28 L22 38 Z"
            stroke="currentColor"
            stroke-width="3.5"
            stroke-linejoin="round"
            fill="none"
            class="app-boot__stroke"
          />
          <!-- itens a cair para dentro -->
          <circle cx="44" cy="12" r="7" class="app-boot__dot app-boot__dot--1" fill="var(--color-primary)" />
          <circle cx="60" cy="8" r="6.5" class="app-boot__dot app-boot__dot--2" fill="var(--color-secondary)" />
          <circle cx="76" cy="12" r="7" class="app-boot__dot app-boot__dot--3" fill="var(--color-primary-muted)" />
        </svg>
      </div>
      <p class="app-boot__text">A encher o carrinho…</p>
    </div>
  </div>
}

<router-outlet />
