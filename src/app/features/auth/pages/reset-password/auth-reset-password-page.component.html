<main class="auth-page">
  <div class="auth-page__card">
    <div class="auth-page__brand" aria-hidden="true">
      <span class="auth-page__brand-dot"></span>
      <span class="auth-page__brand-name">VainoZap</span>
    </div>

    @if (sucesso()) {
      <div class="login-heading">
        <h1 class="auth-page__title">Senha redefinida!</h1>
        <p class="auth-page__sub">Sua senha foi alterada com sucesso. Redirecionando para o login…</p>
      </div>
    } @else {
      <div class="login-heading">
        <h1 class="auth-page__title">Nova senha</h1>
        <p class="auth-page__sub">Escolha uma senha com pelo menos 6 caracteres.</p>
      </div>

      <form class="auth-form" (ngSubmit)="submit()" novalidate>
        <app-input-password
          label="Nova senha"
          autocomplete="new-password"
          [(value)]="novaSenha"
        />

        <app-input-password
          label="Confirmar senha"
          placeholder="Repita a senha"
          autocomplete="new-password"
          [(value)]="confirmar"
        />

        @if (erro()) {
          <p class="auth-form__erro" role="alert">{{ erro() }}</p>
        }

        <button
          type="submit"
          class="auth-form__btn"
          [disabled]="loading() || !novaSenha() || !confirmar() || !token"
        >
          @if (loading()) {
            <span class="auth-form__spinner" aria-hidden="true"></span>
            Salvando…
          } @else {
            Redefinir senha
          }
        </button>
      </form>

      <p class="auth-page__footer-link">
        <a routerLink="/auth/login" class="auth-page__link">← Voltar para o login</a>
      </p>
    }
  </div>
</main>
