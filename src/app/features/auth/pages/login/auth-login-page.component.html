<main class="auth-page">
  <div class="auth-page__card">
    <div class="auth-page__brand" aria-hidden="true">
      <span class="auth-page__brand-dot"></span>
      <span class="auth-page__brand-name">VainoZap</span>
    </div>

    <div class="login-heading">
      <h1 class="auth-page__title">Bem-vindo de volta</h1>
      <p class="auth-page__sub">Acesse a área do lojista</p>
    </div>

    <form class="auth-form" (ngSubmit)="submit()" novalidate>
      <app-input
        label="E-mail"
        type="email"
        placeholder="seu@email.com"
        autocomplete="email"
        inputId="login-email"
        [required]="true"
        [(value)]="email"
      />

      <app-input-password
        label="Senha"
        autocomplete="current-password"
        inputId="login-senha"
        [(value)]="senha"
      />

      @if (erro()) {
        <p class="auth-form__erro" role="alert">{{ erro() }}</p>
      }

      <button
        type="submit"
        class="auth-form__btn"
        [disabled]="loading()"
      >
        @if (loading()) {
          <span class="auth-form__spinner" aria-hidden="true"></span>
          Entrando…
        } @else {
          Entrar
        }
      </button>
    </form>

    <p class="auth-page__footer-link">
      <a routerLink="/auth/forgot-password" class="auth-page__link">Esqueceu a senha?</a>
    </p>

    <p class="auth-page__footer-link">
      Ainda não tem conta?
      <a routerLink="/auth/cadastro" class="auth-page__link">Criar conta grátis</a>
    </p>
  </div>
</main>
