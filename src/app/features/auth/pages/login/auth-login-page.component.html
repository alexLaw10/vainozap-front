<main class="auth-page">
  <div class="auth-page__card">
    <div class="auth-page__brand" aria-hidden="true">
      <span class="auth-page__brand-dot"></span>
      <span class="auth-page__brand-name">Saas</span>
    </div>

    <div class="login-heading">
      <h1 class="auth-page__title">Bem-vindo de volta</h1>
      <p class="auth-page__sub">Acesse a área do lojista</p>
    </div>

    <form class="auth-form" (ngSubmit)="submit()" novalidate>
      <div class="auth-form__field">
        <label class="auth-form__label" for="login-email">E-mail</label>
        <input
          id="login-email"
          type="email"
          class="auth-form__input"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          placeholder="seu@email.com"
          required
        />
      </div>

      <div class="auth-form__field">
        <label class="auth-form__label" for="login-senha">Senha</label>
        <input
          id="login-senha"
          type="password"
          class="auth-form__input"
          [(ngModel)]="senha"
          name="senha"
          autocomplete="current-password"
          placeholder="••••••••"
          required
        />
      </div>

      @if (erro()) {
        <p class="auth-form__erro" role="alert">{{ erro() }}</p>
      }

      <button
        type="submit"
        class="auth-form__btn"
        [disabled]="loading() || !email || !senha"
      >
        @if (loading()) {
          <span class="auth-form__spinner" aria-hidden="true"></span>
          Entrando…
        } @else {
          Entrar
        }
      </button>
    </form>

    <p class="auth-page__footer-link">
      <a routerLink="/auth/forgot-password" class="auth-page__link">Esqueceu a senha?</a>
    </p>

    <p class="auth-page__footer-link">
      Ainda não tem conta?
      <a routerLink="/auth/cadastro" class="auth-page__link">Criar conta grátis</a>
    </p>
  </div>
</main>
